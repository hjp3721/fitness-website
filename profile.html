<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - FitGear</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="logo">Fit<span>Gear</span></a>
      <ul class="nav-links">
        <li><a href="/">首页</a></li>
        <li><span id="navUsername" style="font-weight:600;color:#e63946"></span></li>
        <li><button class="btn btn-primary" onclick="logout()">退出</button></li>
      </ul>
    </div>
  </nav>

  <div class="profile-page">
    <div class="profile-card">
      <h2>个人中心</h2>
      <p>欢迎回来，<strong id="userDisplay"></strong>！</p>
      <div style="background:#f8f9fa;border-radius:12px;padding:30px;">
        <h3 style="margin-bottom:16px;">我的订单</h3>
        <p style="color:#888;">暂无订单，快去逛逛吧！</p>
        <a href="/" class="btn btn-primary" style="display:inline-block;margin-top:16px;">去购物</a>
      </div>
    </div>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
